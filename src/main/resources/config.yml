#  ========================[ Format ]===================================

# {ch}: 채널 이름
# {nick}: 시청자 닉네임
# {msg}: 메세지
# {paid}: 후원 금액
# {plat} 플렛폼
# --/채팅/--
채팅:
  이모티콘: "&7(이모티콘)&f"
  익명: "(익명)"
  형식: "&l[ &a{ch}&f ] &r {nick} : {msg} &7- &r&l[ {plat} ]"
# --/후원/--
후원:
  형식: "&l[ &a{ch}&f ] &e{paid}원 &7> &f{nick} &d:: &b{msg} &7- &r&l&6[ 후원 ]"
  타이틀표시: true
  타이틀형식: "&e{paid}&f원 후원!"

플렛폼:
  # --/플렛폼 표시 설정/--
  # color가 true일때 {plat}이 치지직이라면 "치지직"이라는 글자가 초록색으로 표기됩니다.
  채색: true
  # 치지직일 경우 Chzzk으로 표시됨
  영어: false

# ========================[ Event ]===================================

# 후원을 받았을때 그 금액에 설정된 명령어를 실행합니다
# 명령어를 실행하고 싶지 않다면 공백으로 두거나 아예 지워버리면 됩니다.
# 명령어로도 설정 가능 ( /oa 후원 (금액) (명령어) )
# ex) '10000': "kill {player}" -> 1000원을 후원 받으면 kill 명령어가 실행됨
# {player}:플레이어 닉네임
# {user}: 후원자 닉네임
# {msg}: 후원 메세지
# {paid}: 후원 금액
# !- 명령어의 주제는 채널의 주인( 채널을 등록한 플레이어 )입니다 -!
#
후원이벤트:
  '금액': '명령어'
#  '1000': "kill {player}"
#  '2000': "say a"
#  '3000': "custom_command"

#  ========================[ Plugin ]===================================

# 명령어 접두사
prefix: '<b><gradient:#E7B0B0:#BA4242>[ OnAir ]</gradient></b> '

# 명령어 설정
command:
  oa:
    name: 'oa'
    aliases:
      - 'onair'
      - '방송'
    description: 'OnAir 메인 명령어'
  oadmin:
    name: 'oadmin'
    aliases:
      - 'oad'
      - '방송관리'
    description: 'OnAir 관리자 명령어'

tab-complete:
  oa:
    '1':
      - 등록
      - 등록해제
      - 정보
      - 설정
      - 도움말
    '2':
      - 채팅알림
      - 후원알림
      - 메세지대상
      - 채널이름
    '3':
      - 켜기
      - 끄기
    '4':
      - 스트리머만
      - 전체
    '5': 채널명
    '6': ID
    '7': 새채널이름

platforms:
  - 치지직
  - 유튜브
  - 투네이션
  - 숲
  - 트위치


